<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hunt Tracker — Share Cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="og-cards.css" />
<style>
  html, body { margin: 0; background: #0d0b14; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="og-cards.jsx"></script>
<script type="text/babel">
const { CardBroadcast, CardScoreboard, CardMinimal } = window.OG;
function Page() {
  return (
    <DesignCanvas>
      <DCSection id="og" title="Live link share card" subtitle="Open Graph · 1200×630 · same template, live hunt data">
        <DCArtboard id="m1" label="Minimal · Friday Disc Hunt ($800 · 12)" width={1200} height={630}>
          <CardMinimal huntName="Friday Disc Hunt" start={800} bonusCount={12} />
        </DCArtboard>
        <DCArtboard id="m2" label="Same template · different hunt ($2,000 · 6)" width={1200} height={630}>
          <CardMinimal huntName="Sunday $2K Sendoff" start={2000} bonusCount={6} />
        </DCArtboard>
      </DCSection>
      <DCSection id="alts" title="Other directions (for reference)" subtitle="Not chosen — kept for comparison">
        <DCArtboard id="a" label="A · Broadcast chyron" width={1200} height={630}><CardBroadcast /></DCArtboard>
        <DCArtboard id="b" label="B · Scoreboard" width={1200} height={630}><CardScoreboard /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Page />);
</script>
</body>
</html>
